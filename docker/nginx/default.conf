# Derrière Traefik, on reçoit le protocole d'origine dans X-Forwarded-Proto.
# On le propage à gunicorn plutôt que d'utiliser $scheme (qui vaudrait toujours
# « http » sur le port 80 interne et casserait la détection HTTPS de Django).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream tribu_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Allow reasonably large image / document uploads via the Wagtail admin.
    client_max_body_size 25m;

    # Static files (collected to the shared volume, hashed by ManifestStaticFilesStorage).
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # User-uploaded media (Wagtail images / documents).
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://tribu_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_redirect off;
    }
}
