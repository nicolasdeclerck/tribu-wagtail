upstream tribu_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Allow reasonably large image / document uploads via the Wagtail admin.
    client_max_body_size 25m;

    # Static files (collected to the shared volume, hashed by ManifestStaticFilesStorage).
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # User-uploaded media (Wagtail images / documents).
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass http://tribu_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
