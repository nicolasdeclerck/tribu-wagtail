services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tribu}
      POSTGRES_USER: ${POSTGRES_USER:-tribu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tribu} -d ${POSTGRES_DB:-tribu}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: tribu.settings.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static:/app/static
      - media:/app/media
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-bookworm
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/static:ro
      - media:/app/media:ro

volumes:
  pgdata:
  static:
  media:
