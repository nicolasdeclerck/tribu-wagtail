name: Deploy to VPS

# Déploiement auto à chaque push sur main (+ déclenchement manuel possible).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH sur le VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            echo "==> Mise à jour du code (aligne le VPS sur origin/main)"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Rebuild + redémarrage des conteneurs"
            # L'entrypoint rejoue migrate + collectstatic au boot du conteneur web.
            docker compose -p tribu up -d --build --remove-orphans

            echo "==> Nettoyage des images orphelines"
            docker image prune -f

            echo "==> Vérification santé"
            docker compose -p tribu ps
            # gunicorn ne répond qu'après migrate + collectstatic (entrypoint) :
            # on poll jusqu'à 90 s avant de déclarer un échec.
            for i in $(seq 1 18); do
              code=$(curl -4 -s -o /dev/null -m 10 -w "%{http_code}" https://latribudoya.fr/ || echo 000)
              if [ "$code" = "200" ]; then echo "Site OK ✅ (HTTP 200)"; exit 0; fi
              echo "  tentative $i/18 → HTTP $code, nouvel essai dans 5 s…"
              sleep 5
            done
            echo "❌ Le site ne répond pas 200 après 90 s"
            docker compose -p tribu logs --tail 50 web
            exit 1
